<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Whale Mate - Logs</title>
  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- FontAwesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    .theme-switch {
      padding: 0.4rem 0.75rem;
      border-radius: 0.25rem;
      cursor: pointer;
      transition: all 0.2s ease-in-out;
    }
    .theme-switch:hover {
      background-color: rgba(255,255,255,0.1);
    }
    body[data-bs-theme="dark"] .theme-switch:hover {
      background-color: rgba(255,255,255,0.1);
    }
    
    /* Textbox style for logs */
    .log-textbox {
      font-family: monospace;
      white-space: pre;
      background-color: #1a1a1a;
      color: #e0e0e0;
      border: 1px solid #2d2d2d;
      border-radius: 4px;
      padding: 15px;
      margin: 0;
      overflow: auto;
      min-height: 200px;
      max-height: 70vh;
    }
    
    /* Empty state styling */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: #6c757d;
      text-align: center;
    }
    .empty-state i {
      font-size: 2rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body class="bg-dark text-light" data-bs-theme="dark">
  <!-- Your exact original navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary">
    <div class="container-fluid">
      <a class="navbar-brand" href="stacks.html">
        <i class="fas fa-ship me-2 text-primary"></i>
        <span class="fw-bold">Whale Mate</span>
      </a>
      
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topNavbar">
        <span class="navbar-toggler-icon"></span>
      </button>
      
      <div class="collapse navbar-collapse justify-content-end" id="topNavbar">
        <ul class="navbar-nav align-items-center">
          <li class="nav-item mx-2">
            <a class="nav-link d-flex align-items-center" href="stacks.html">
              <i class="fas fa-box me-1"></i>
              <span>Stacks</span>
            </a>
          </li>
          <li class="nav-item mx-2">
            <a class="nav-link active d-flex align-items-center" href="logs.html">
              <i class="fas fa-scroll me-1"></i>
              <span>Logs</span>
            </a>
          </li>
          <li class="nav-item mx-2">
            <a class="nav-link d-flex align-items-center" href="versioning.html">
              <i class="fas fa-code-branch me-1"></i>
              <span>Versioning</span>
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    <h2 class="mb-4 text-center">📰 Update Logs</h2>
    
    <!-- Filter controls -->
    <div class="row g-3 mb-3 align-items-center">
      <div class="col-auto">
        <label for="logLevelFilter" class="col-form-label">Level:</label>
      </div>
      <div class="col-auto">
        <select class="form-select form-select-sm bg-dark text-light" id="logLevelFilter" style="width: auto;">
          <option value="">All</option>
          <option value="ERROR">ERROR</option>
          <option value="WARNING">WARNING</option>
          <option value="INFO">INFO</option>
          <option value="SUCCESS">SUCCESS</option>
        </select>
      </div>
      <div class="col-auto">
        <div class="input-group input-group-sm">
          <span class="input-group-text bg-dark text-light border-secondary">
            <i class="fas fa-search"></i>
          </span>
          <input type="text" class="form-control bg-dark text-light border-secondary" id="logSearchInput" placeholder="Search logs...">
        </div>
      </div>
      <div class="col-auto ms-auto">
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" id="autoRefreshToggle">
          <label class="form-check-label" for="autoRefreshToggle">Auto-refresh (30s)</label>
        </div>
      </div>
    </div>
    
    <!-- Changed to simple textbox display -->
    <div class="card bg-dark border-light">
      <div class="card-body p-0">
        <pre class="log-textbox" id="update-log">Loading logs...</pre>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    let rawLogData = [];
    let autoRefreshInterval = null;

    // Colorize log lines based on level
    function colorizeLog(text) {
      // Escape HTML first
      text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      
      // Color code patterns
      const patterns = [
        { regex: /(\[ERROR\])/gi, color: '#ff6b6b', bold: true },
        { regex: /(\[WARNING\])/gi, color: '#ffd43b', bold: true },
        { regex: /(\[INFO\])/gi, color: '#74c0fc', bold: false },
        { regex: /(\[SUCCESS\])/gi, color: '#69db7c', bold: true },
        { regex: /(error|failed|exception)/gi, color: '#ff6b6b', bold: false },
        { regex: /(warning|warn)/gi, color: '#ffd43b', bold: false },
      ];
      
      // Simple approach: wrap known patterns in spans
      let result = text;
      result = result.replace(/\[ERROR\]/gi, '<span style="color: #ff6b6b; font-weight: bold;">[ERROR]</span>');
      result = result.replace(/\[WARNING\]/gi, '<span style="color: #ffd43b; font-weight: bold;">[WARNING]</span>');
      result = result.replace(/\[INFO\]/gi, '<span style="color: #74c0fc;">[INFO]</span>');
      result = result.replace(/\[SUCCESS\]/gi, '<span style="color: #69db7c; font-weight: bold;">[SUCCESS]</span>');
      
      return result;
    }

    // Filter and display logs
    function displayLogs() {
      const logElement = document.getElementById('update-log');
      const levelFilter = document.getElementById('logLevelFilter').value;
      const searchText = document.getElementById('logSearchInput').value.toLowerCase();
      
      if (!rawLogData || rawLogData.length === 0) {
        logElement.innerHTML = `<div class="empty-state">
          <i class="fas fa-clock"></i>
          <div>No logs available yet</div>
          <small class="mt-2">Will appear after updater runs (CRON_SCHEDULE)</small>
        </div>`;
        return;
      }
      
      let filteredLogs = rawLogData;
      
      // Filter by level
      if (levelFilter) {
        filteredLogs = filteredLogs.filter(line => 
          line.toUpperCase().includes(`[${levelFilter}]`)
        );
      }
      
      // Filter by search text
      if (searchText) {
        filteredLogs = filteredLogs.filter(line => 
          line.toLowerCase().includes(searchText)
        );
      }
      
      if (filteredLogs.length === 0) {
        logElement.innerHTML = `<div class="empty-state">
          <i class="fas fa-filter"></i>
          <div>No matching logs</div>
          <small class="mt-2">Try adjusting your filters</small>
        </div>`;
        return;
      }
      
      // Join and colorize
      const colorized = colorizeLog(filteredLogs.join('\n'));
      logElement.innerHTML = colorized;
    }

    // Load logs from API
    function loadLogs() {
      fetch('/api/logs')
        .then(response => response.json())
        .then(data => {
          if (data.log === null) {
            rawLogData = [];
          } else if (typeof data.log === 'string') {
            rawLogData = data.log.split('\n').filter(line => line.trim());
          } else if (Array.isArray(data.log)) {
            rawLogData = data.log;
          } else {
            throw new Error('Invalid log format received');
          }
          displayLogs();
        })
        .catch(error => {
          document.getElementById('update-log').innerHTML = 
            `<div class="empty-state text-danger">
              <i class="fas fa-exclamation-triangle"></i>
              <div>Error loading logs</div>
              <small class="mt-2">${error.message}</small>
            </div>`;
        });
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      loadLogs();
      
      // Set up filter listeners
      document.getElementById('logLevelFilter').addEventListener('change', displayLogs);
      document.getElementById('logSearchInput').addEventListener('input', displayLogs);
      
      // Auto-refresh toggle
      document.getElementById('autoRefreshToggle').addEventListener('change', (e) => {
        if (e.target.checked) {
          autoRefreshInterval = setInterval(loadLogs, 30000);
        } else {
          clearInterval(autoRefreshInterval);
        }
      });
    });
  </script>
</body>
</html>
