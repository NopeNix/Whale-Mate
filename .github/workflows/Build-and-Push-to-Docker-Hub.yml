name: Build and Push to Docker Hub
on:
  push:
    branches:
      - "main"
      - "dev"
  pull_request:
    branches:
      - "main"
      - "dev"
  schedule:
    - cron: "0 0 * * 0" # Every Sunday at midnight


jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set branch and build number variables
        id: vars
        run: |
          # Determine branch prefix
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "branch_prefix=MAIN" >> $GITHUB_OUTPUT
            echo "floating_tag=latest" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
            echo "branch_prefix=DEV" >> $GITHUB_OUTPUT
            echo "floating_tag=dev" >> $GITHUB_OUTPUT
          else
            echo "branch_prefix=PR" >> $GITHUB_OUTPUT
            echo "floating_tag=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          fi

      - name: Generate build version
        id: build_version
        run: |
          # Get current date/time components
          DATE=$(date +%Y-%m-%d)
          TIME=$(date +%H%M)
          
          # Get branch prefix from previous step
          PREFIX=${{ steps.vars.outputs.branch_prefix }}
          
          # Get previous builds count for this minute from GitHub API
          RUNS=$(gh run list --branch ${{ github.ref }} --event push --status success --json createdAt -q "[.[] | select(.createdAt | startswith(\"$DATE\"))] | length" 2>/dev/null || echo "0")
          
          # Increment for current build (add 1 since current run isn't counted yet)
          BUILD_NUM=$((RUNS + 1))
          
          # Format: PREFIX-YYYY-MM-DD-HHMM-BUILDNUM
          VERSION="${PREFIX}-${DATE}-${TIME}-${BUILD_NUM}"
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT
          
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            nopenix/whale-mate:${{ steps.vars.outputs.floating_tag }}
            nopenix/whale-mate:${{ steps.build_version.outputs.version }}
          build-args: "BUILD_VERSION=${{ steps.build_version.outputs.version }} BUILD_DATE=${{ steps.build_version.outputs.date }}"
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create deployment artifact with version info
        if: github.event_name != 'pull_request'
        run: |
          echo "BUILD_VERSION=${{ steps.build_version.outputs.version }}" >> $GITHUB_ENV
          echo "Build completed: nopenix/whale-mate:${{ steps.build_version.outputs.version }}"
          echo "Also tagged as: nopenix/whale-mate:${{ steps.vars.outputs.floating_tag }}"
