name: Build and Push to Docker Hub
on:
  push:
    branches:
      - "main"
      - "dev"
  pull_request:
    branches:
      - "main"
      - "dev"
  schedule:
    - cron: "0 0 * * 0"

jobs:
  docker:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      floating: ${{ steps.version.outputs.floating }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            PREFIX="MAIN"
            FLOATING="latest"
          elif [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
            PREFIX="DEV"
            FLOATING="dev"
          else
            PREFIX="PR"
            FLOATING="pr-${{ github.event.pull_request.number }}"
          fi
          
          DATE=$(date +%Y-%m-%d)
          TIME=$(date +%H%M)
          
          RUNS=$(gh run list --branch ${{ github.ref }} --event push --status success --json createdAt -q "[.[] | select(.createdAt | startswith(\"$DATE\"))] | length" 2>/dev/null || echo "0")
          BUILD_NUM=$((RUNS + 1))
          
          VERSION="${PREFIX}-${DATE}-${TIME}-${BUILD_NUM}"
          
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "floating=${FLOATING}" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set build args
        run: |
          echo "BUILD_VERSION=${{ steps.version.outputs.version }}" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date +%Y-%m-%d)" >> $GITHUB_ENV
          echo "Build version: ${{ steps.version.outputs.version }}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            nopenix/whale-mate:${{ steps.version.outputs.floating }}
            nopenix/whale-mate:${{ steps.version.outputs.version }}
