name: Build and Push to Docker Hub
on:
  push:
    branches:
      - "main"
      - "dev"
  pull_request:
    branches:
      - "main"
      - "dev"
  schedule:
    - cron: "0 0 * * 0" # Every Sunday at midnight


jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine version
        id: version
        run: |
          # Determine branch prefix
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            PREFIX="MAIN"
            FLOATING_TAG="latest"
          elif [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
            PREFIX="DEV"
            FLOATING_TAG="dev"
          else
            PREFIX="PR"
            FLOATING_TAG="pr-${{ github.event.pull_request.number }}"
          fi
          
          # Get current date/time
          DATE=$(date +%Y-%m-%d)
          TIME=$(date +%H%M)
          
          # Count builds this minute
          RUNS=$(gh run list --branch ${{ github.ref }} --event push --status success --json createdAt -q "[.[] | select(.createdAt | startswith(\"$DATE\"))] | length" 2>/dev/null || echo "0")
          BUILD_NUM=$((RUNS + 1))
          
          # Full version
          VERSION="${PREFIX}-${DATE}-${TIME}-${BUILD_NUM}"
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "floating=$FLOATING_TAG" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            nopenix/whale-mate:${{ steps.version.outputs.floating }}
            nopenix/whale-mate:${{ steps.version.outputs.version }}
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.version }}
            BUILD_DATE=${{ steps.version.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
